<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" /><stop offset="100%" style="stop-color:#ff00ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#neonGradient)" stroke-width="3" stroke-dasharray="10 5" opacity="0.3" />
  <path d="M60 70 L100 130 L140 70" fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <rect x="85" y="55" width="30" height="30" rx="4" fill="none" stroke="#00f2ff" stroke-width="4" filter="url(#glow)"><animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite" /></rect>
  <text x="100" y="175" font-family="monospace" font-size="22" font-weight="bold" fill="url(#neonGradient)" text-anchor="middle" letter-spacing="2">VOID.MD</text>
</svg>
