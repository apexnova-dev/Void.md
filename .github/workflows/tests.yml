# Browser-based tests for void.html using Playwright
# Tests run against void.html and core-package functionality

name: Tests

on:
  push:
    branches: [main, core, experimental]
  pull_request:
    branches: [main, core]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  browser-tests:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run browser tests
        run: npm run test:ci

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ESLint and dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js,.html