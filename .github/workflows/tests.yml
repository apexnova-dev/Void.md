# Browser-based tests for void.html using Playwright
# Tests run against void.html and core-package functionality

name: Tests

on:
  push:
    branches: [core, production, experimental]
  pull_request:
    branches: [core, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  browser-tests:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run server and tests
        run: |
          npx serve -s . -l 3000 &
          SERVER_PID=$!
          sleep 3
          npm run test:ci
          kill $SERVER_PID 2>/dev/null || true

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
