# Optional CI: run browser-based unit tests (see AGENTS.md and docs/architecture/tests/)
name: Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Start static server
        run: npx serve -s . -l 3000 &
      - name: Run unit tests in browser
        run: |
          sleep 3
          npm run test:ci
        env:
          BASE_URL: http://127.0.0.1:3000
